<div class="page">
  <header class="hero">
    <div class="hero-text">
      <h1>
        Find your teacher
        <span class="curriculum-badge" *ngIf="curriculumLabel()">{{ curriculumLabel() }}</span>
      </h1>
      <p *ngIf="curriculumLabel()">Showing {{ curriculumLabel() }} curriculum teachers</p>
      <p *ngIf="!curriculumLabel()">Browse teachers, read student reviews, and unlock premium lessons.</p>
    </div>

    <div class="filters">
      <input
        type="search"
        class="input"
        placeholder="Search by name, subject, or email..."
        (input)="setSearch($any($event.target).value)"
      />

      <div class="custom-dropdown">
        <button
          type="button"
          #dropdownTrigger
          class="dropdown-trigger"
          [class.open]="subjectDropdownOpen()"
          (click)="toggleDropdown()"
          [attr.aria-expanded]="subjectDropdownOpen()"
        >
          <span class="dropdown-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
            {{ selectedLabel }}
          </span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
    </div>
  </header>

  <section *ngIf="isLoading(); else loaded" class="grid">
    <div class="card-skel" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="row">
        <app-skeleton width="64px" height="64px" radius="999px" />
        <div class="col">
          <app-skeleton width="55%" height="14px" />
          <app-skeleton width="35%" height="12px" />
        </div>
      </div>
      <app-skeleton width="90%" height="12px" />
      <app-skeleton width="75%" height="12px" />
    </div>
  </section>

  <ng-template #loaded>
    <section class="grid" *ngIf="filtered().length; else empty">
      <app-teacher-card
        *ngFor="let t of filtered()"
        [teacher]="t"
        [averageRating]="avgRatingFor(t.id)"
      />
    </section>

    <ng-template #empty>
      <div class="empty">
        <p>No teachers found. Try a different search or filter.</p>
      </div>
    </ng-template>
  </ng-template>
</div>

<ng-template #dropdownTpl>
  <div class="dropdown-portal" @dropdownAnim>
    <div class="dropdown-menu">
      <button
        type="button"
        *ngFor="let s of subjects()"
        class="dropdown-item"
        [class.active]="subjectFilter() === s"
        (click)="setSubject(s)"
      >
        <span class="item-text">
          <svg *ngIf="subjectFilter() === s" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          {{ s === 'all' ? 'All subjects' : s }}
        </span>
      </button>
    </div>
  </div>
</ng-template>
